# SeferFlow API Docker Compose

version: '3.8'

services:
  # API Application
  seferflow-api:
    build: .
    ports:
      - "8000:8000"
      - "9000:9000"  # Prometheus metrics
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/seferflow
      - SECRET_KEY=${SECRET_KEY:-}
      - MAX_WORKERS=4
      - ENABLE_CPU_WORKERS=true
      - ENABLE_GPU_WORKERS=false
      - ENABLE_METRICS=true
      - LOG_LEVEL=INFO
      - SESSION_STORAGE=redis
    depends_on:
      - redis
      - db
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (Session Store)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # PostgreSQL (Progress & User Data)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=seferflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

# Named volumes for data persistence
volumes:
  redis_data:
  postgres_data:
